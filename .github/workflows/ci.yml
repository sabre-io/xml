name: continuous-integration
on:
  push:
    branches:
      - master
      - release/*
  pull_request:
jobs:
  unit-testing:
    name: PHPUnit (PHP ${{ matrix.php-versions }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.3','8.4']
        coverage: ['pcov']
        code-style: ['no']
        code-analysis: ['no']
        rector-check: ['no']
        include:
          - php-versions: '8.2'
            coverage: 'pcov'
            code-style: 'yes'
            code-analysis: 'yes'
            rector-check: 'no'
          - php-versions: '8.5'
            coverage: 'pcov'
            code-style: 'no'
            code-analysis: 'yes'
            rector-check: 'yes'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, dom, fileinfo, mysql, redis, opcache
          coverage: ${{ matrix.coverage }}
          tools: composer

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          # Use composer.json for key, if composer.lock is not committed.
          # key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Code Analysis (PHP CS-Fixer)
        if: matrix.code-style == 'yes'
        run: PHP_CS_FIXER_IGNORE_ENV=true php vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Code Analysis (PHPStan)
        if: matrix.code-analysis == 'yes'
        run: composer phpstan

      - name: Code Refactoring (rector)
        if: matrix.rector-check == 'yes'
        run: composer rector-check

      - name: Test with phpunit
        run: vendor/bin/phpunit --configuration tests/phpunit.xml --coverage-clover clover.xml

      - name: Code Coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: matrix.coverage != 'none'
